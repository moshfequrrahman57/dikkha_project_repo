<!DOCTYPE html>
<html>
<head>
    <style>
        /* Import Google Font directly */
        @import url('https://googleapis.com');

        @font-face {
        font-family: 'kalpurush';
        /* static ফোল্ডারের সঠিক পাথ দিন */
        src: url('file://{{ font_path }}') format('truetype');
        font-weight: normal;
        font-style: normal;
    }

        body {
            font-family: 'Roboto', sans-serif;
            font-size: 14px;
            color: #333;
        }
        h1 {
            color: #007bff;
        }
        .myCustomFont{
            font-family: 'kalpurush', sans-serif;
            font-size: 56px;
            color: #cb1a1a;
        }
        .tiro-bangla-regular {
  font-family: "Tiro Bangla", serif;
  font-weight: 400;
  font-style: normal;
}

.tiro-bangla-regular-italic {
  font-family: "Tiro Bangla", serif;
  font-weight: 400;
  font-style: italic;
  font-size: 46px;
  color: #1acb78;
}

    </style>
</head>
<body>
    <h1>Project Report</h1>
    <p>This PDF was generated using WeasyPrint and includes the custom <strong>Roboto</strong> font from Google.</p>
    <p class="myCustomFont">Data from Django: {{ some_variable }}</p>
</body>
</html>
